<!DOCTYPE html>
<html>
<head>
  <title>Ticket Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;background:#000;color:#fff;font-family:Arial,sans-serif;display:flex;justify-content:center;min-height:100vh;">

  <div style="width:100%;max-width:980px;padding:40px 20px 70px 20px;text-align:center;">

    <h1 style="font-size:72px;margin:20px 0 40px 0;font-weight:800;">
      🎟️ Ticket Portal
    </h1>

    <form id="ticketForm" enctype="multipart/form-data"
      style="
        width:100%;
        max-width:650px;
        margin:0 auto;
        text-align:left;
        background:linear-gradient(90deg,#111,#161616);
        padding:40px 44px 46px 44px;
        border-radius:30px;
        box-shadow:0 0 30px rgba(255,255,255,0.03);
      ">

      <label style="display:block;font-size:32px;margin-bottom:14px;">🎉 EVENT NAME:-</label>
      <input
        id="eventName"
        name="eventName"
        required
        placeholder="PROM NIGHT"
        style="
          width:100%;
          padding:18px 20px;
          margin:0 0 30px 0;
          border-radius:6px;
          border:1px solid #777;
          font-size:22px;
          box-sizing:border-box;
        "
      >

      <label style="display:block;font-size:32px;margin-bottom:14px;">👤 NAME:-</label>
      <input
        id="name"
        name="name"
        required
        style="
          width:100%;
          padding:18px 20px;
          margin:0 0 30px 0;
          border-radius:6px;
          border:1px solid #777;
          font-size:22px;
          box-sizing:border-box;
        "
      >

      <label style="display:block;font-size:32px;margin-bottom:14px;">✉️ EMAIL:-</label>
      <input
        id="email"
        name="email"
        type="email"
        required
        style="
          width:100%;
          padding:18px 20px;
          margin:0 0 30px 0;
          border-radius:6px;
          border:1px solid #777;
          font-size:22px;
          box-sizing:border-box;
        "
      >

      <label style="display:block;font-size:32px;margin-bottom:14px;">📞 CONTACT:-</label>
      <input
        id="contact"
        name="contact"
        required
        style="
          width:100%;
          padding:18px 20px;
          margin:0 0 30px 0;
          border-radius:6px;
          border:1px solid #777;
          font-size:22px;
          box-sizing:border-box;
        "
      >

      <label style="display:block;font-size:32px;margin-bottom:14px;">🎫 PASS TYPE:-</label>
      <input
        id="passType"
        name="passType"
        required
        placeholder="VIP / GENERAL / COUPLE"
        style="
          width:100%;
          padding:18px 20px;
          margin:0 0 30px 0;
          border-radius:6px;
          border:1px solid #777;
          font-size:22px;
          box-sizing:border-box;
        "
      >

      <label style="display:block;font-size:32px;margin-bottom:18px;">📸 PAYMENT SS:-</label>
      <input
        id="paymentSS"
        name="paymentSS"
        type="file"
        accept="image/*"
        required
        style="
          width:100%;
          margin:0 0 42px 0;
          color:white;
          font-size:18px;
        "
      >

      <button
        type="submit"
        style="
          width:100%;
          padding:22px 20px;
          font-size:28px;
          border:none;
          border-radius:6px;
          cursor:pointer;
          background:#e9e9e9;
          color:#111;
          font-weight:500;
        "
      >
        Generate Ticket
      </button>
    </form>

    <div style="margin-top:55px;">
      <a href="/resend-all" style="font-size:28px;color:#56a8ff;">
        Send New QR to Everyone
      </a>
    </div>

    <div style="margin-top:22px;">
      <a href="/scan" style="font-size:24px;color:#56a8ff;">
        Open Scanner
      </a>
    </div>

    <div style="margin-top:22px;">
      <a href="/tickets" style="font-size:24px;color:#56a8ff;">
        View All Tickets
      </a>
    </div>

    <div style="margin-top:22px;">
      <a href="/download-excel" style="font-size:24px;color:#56a8ff;">
        Download Excel
      </a>
    </div>

    <p id="status" style="margin-top:25px;color:#4da3ff;font-size:20px;"></p>
  </div>

  <script>
    document.getElementById("ticketForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const status = document.getElementById("status");
      status.innerText = "Generating ticket...";

      const formData = new FormData();
      formData.append("eventName", document.getElementById("eventName").value);
      formData.append("name", document.getElementById("name").value);
      formData.append("email", document.getElementById("email").value);
      formData.append("contact", document.getElementById("contact").value);
      formData.append("passType", document.getElementById("passType").value);

      const fileInput = document.getElementById("paymentSS");
      if (!fileInput.files[0]) {
        status.innerText = "Please upload payment screenshot.";
        return;
      }

      formData.append("paymentSS", fileInput.files[0]);

      try {
        const res = await fetch("/generate", {
          method: "POST",
          body: formData
        });

        const html = await res.text();
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        status.innerText = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
