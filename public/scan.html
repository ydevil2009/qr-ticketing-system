<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Scan QR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="text-align:center; font-family:Arial, sans-serif; background:#111; color:white; padding-top:30px; margin:0;">

  <h2>🎟 Scan Ticket</h2>
  <p>Point camera at QR code</p>

  <div id="reader" style="width:320px; margin:auto; border-radius:12px; overflow:hidden;"></div>
  <p id="status" style="margin-top:20px; color:#4da3ff; padding:0 20px; word-break:break-word;"></p>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script>
    let scannerStarted = false;
    const statusEl = document.getElementById("status");
    const html5QrCode = new Html5Qrcode("reader");

    function getValidVerifyUrl(decodedText) {
      const text = String(decodedText || "").trim();
      if (!text) return null;

      if (text.startsWith("http://") || text.startsWith("https://")) {
        try {
          const url = new URL(text);
          if (url.pathname.startsWith("/verify/")) return url.toString();
        } catch (_) {
          return null;
        }
      }

      if (text.startsWith("/verify/")) {
        return window.location.origin + text;
      }

      if (text.startsWith("verify/")) {
        return window.location.origin + "/" + text;
      }

      return null;
    }

    async function onScanSuccess(decodedText) {
      try {
        statusEl.innerText = "Scanned: " + decodedText;

        const redirectUrl = getValidVerifyUrl(decodedText);
        if (!redirectUrl) {
          alert("Invalid QR");
          return;
        }

        await html5QrCode.stop().catch(() => {});
        window.location.href = redirectUrl;
      } catch (err) {
        console.error("SCAN REDIRECT ERROR:", err);
        alert("Scan error: " + (err.message || err));
      }
    }

    function onScanError() {}

    Html5Qrcode.getCameras()
      .then(devices => {
        if (devices && devices.length && !scannerStarted) {
          scannerStarted = true;

          html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: 250
            },
            onScanSuccess,
            onScanError
          );
        } else {
          statusEl.innerText = "No camera found";
        }
      })
      .catch(err => {
        console.error(err);
        statusEl.innerText = "Camera error: " + err;
      });
  </script>
</body>
</html>
