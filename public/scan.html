<!DOCTYPE html>
<html>
<head>
  <title>Scan QR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="text-align:center; font-family:Arial; background:#111; color:white; padding-top:30px;">

  <h2>🎟 Scan Ticket</h2>
  <p>Point camera at QR code</p>

  <div id="reader" style="width:320px; margin:auto; border-radius:12px; overflow:hidden;"></div>

  <p id="status" style="margin-top:20px; color:#4da3ff;"></p>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <script>
    let scannerStarted = false;

    function onScanSuccess(decodedText) {
      document.getElementById("status").innerText = "Scanned: " + decodedText;

      if (decodedText.includes("/verify/")) {
        window.location.href = decodedText;
      } else {
        alert("Invalid QR");
      }
    }

    function onScanError(error) {}

    const html5QrCode = new Html5Qrcode("reader");

    Html5Qrcode.getCameras()
      .then(devices => {
        if (devices && devices.length && !scannerStarted) {
          scannerStarted = true;

          html5QrCode.start(
            { facingMode: "environment" },
            {
              fps: 10,
              qrbox: 250
            },
            onScanSuccess,
            onScanError
          );
        } else {
          document.getElementById("status").innerText = "No camera found";
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("status").innerText = "Camera error: " + err;
      });
  </script>

</body>
</html>
